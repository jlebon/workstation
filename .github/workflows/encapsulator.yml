name: Encapsulator

env:
  QUAY_BASE: quay.io/jlebon/fedora-silverblue

on:
  schedule:
    # run every day at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  query:
    name: "Query Fedora versions"
    runs-on: ubuntu-latest
    outputs:
      latest: ${{steps.query_versions.outputs.latest}}
      matrix: ${{steps.query_versions.outputs.matrix}}
    steps:
      - name: Query Fedora versions
        id: query_versions
        run: |
          set -xeuo pipefail
          latest_supported=$(curl -s -L https://fedoraproject.org/releases.json | jq -r '[.[].version|select(test("^[0-9]+$"))]|max')
          previous_supported=$((latest_supported - 1))
          # if you're reading this and you know a better way, please let me know!
          rawhide=$(curl -s -L https://src.fedoraproject.org/rpms/fedora-release/raw/rawhide/f/fedora-release.spec \
                      | grep '%define dist_version' | grep -o -E '[0-9]+')
          echo "matrix=$( (seq $previous_supported $((rawhide-1)); echo rawhide) | jq -cnR '[inputs]')" >> $GITHUB_OUTPUT
          echo "latest=$latest_supported" >> $GITHUB_OUTPUT
  encapsulate:
    name: "Encapsulate OSTree commits"
    needs: query
    runs-on: ubuntu-latest
    container:
      image: quay.io/fedora/fedora:latest
      options: --privileged --cgroupns=host -v /var/lib/containers -v /var/tmp -v /tmp
    strategy:
      fail-fast: false
      matrix:
        releasever: ${{fromJson(needs.query.outputs.matrix)}}
    steps:
      - name: Install tools
        run: dnf install -y podman
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install cosign
        uses: sigstore/cosign-installer@main
        with:
          cosign-release: "v2.6.0"
      - name: Build
        run: |
          set -xeuo pipefail
          n=${{ matrix.releasever }}
          cd encapsulator
          # can drop the -v once https://github.com/containers/buildah/issues/5952 is fixed
          # --retry=12 gives ~1h of exponential backoff for transient registry errors
          podman build --retry=12 -v $PWD:/run/src --security-opt=seccomp=unconfined --build-arg RELEASEVER=$n -t "${{ env.QUAY_BASE }}:$n" .
      - name: Push
        run: |
          set -xeuo pipefail
          mkdir -p ~/.docker
          cat > ~/.docker/config.json <<EOF
          ${{ secrets.QUAY_AUTH }}
          EOF
          base64 --decode > ~/.cosign.key <<EOF
          ${{ secrets.COSIGN_PRIVATE_KEY }}
          EOF
          n=${{ matrix.releasever }}
          podman push --retry=12 "$QUAY_BASE:$n" --digestfile digest
          cosign sign -y --key ~/.cosign.key "$QUAY_BASE@$(cat digest)"
          if [[ $n == ${{ needs.query.outputs.latest }} ]]; then
            podman tag "$QUAY_BASE:$n" "$QUAY_BASE:latest"
            podman push --retry=12 "$QUAY_BASE:latest"
          fi
          rm ~/.cosign.key
          rm ~/.docker/config.json
