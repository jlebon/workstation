name: Build

env:
  QUAY_BASE: quay.io/jlebon/workstation

on:
  push:
    branches: [main]
  schedule:
    # run every day at noon
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  query:
    name: "Query Fedora versions"
    runs-on: ubuntu-latest
    outputs:
      latest: ${{steps.query_versions.outputs.latest}}
      matrix: ${{steps.query_versions.outputs.matrix}}
    steps:
      - name: Query Fedora versions
        id: query_versions
        run: |
          set -xeuo pipefail
          latest_supported=$(curl -s -L https://fedoraproject.org/releases.json | jq -r '[.[].version|select(test("^[0-9]+$"))]|max')
          previous_supported=$((latest_supported - 1))
          # if you're reading this and you know a better way, please let me know!
          rawhide=$(curl -s -L https://src.fedoraproject.org/rpms/fedora-release/raw/rawhide/f/fedora-release.spec \
                      | grep '%define dist_version' | grep -o -E '[0-9]+')
          echo "matrix=$( (seq $previous_supported $((rawhide-1)); echo rawhide) | jq -cnR '[inputs]')" >> $GITHUB_OUTPUT
          echo "latest=$latest_supported" >> $GITHUB_OUTPUT
  build-workstation:
    name: "Build Workstation container images"
    needs: query
    runs-on: ubuntu-latest
    container:
      image: quay.io/fedora/fedora:latest
      options: --privileged --cgroupns=host -v /var/lib/containers -v /var/tmp -v /tmp
    strategy:
      fail-fast: false
      matrix:
        releasever: ${{fromJson(needs.query.outputs.matrix)}}
    steps:
      - name: Install tools
        run: dnf install -y podman git gettext
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Configure policy
        run: |
          set -xeuo pipefail
          mkdir -p /etc/containers/registries.d
          cp signing/policy-strict.json /etc/containers/
          cp signing/quay.io-jlebon.yaml /etc/containers/registries.d/
          mkdir -p /etc/pki/containers/
          cp signing/quay.io-jlebon.pub /etc/pki/containers/
      - name: Install cosign
        uses: sigstore/cosign-installer@main
        with:
          cosign-release: "v2.6.0"
      - name: Build
        run: |
          set -xeuo pipefail
          n=${{ matrix.releasever }}
          base_img="quay.io/jlebon/fedora-silverblue:$n"
          # --retry=12 gives ~1h of exponential backoff for transient registry errors
          podman pull --retry=12 "$base_img"
          podman build --retry=12 --skip-unused-stages=false \
            --security-opt=seccomp=unconfined -v $PWD:/run/src \
            --build-arg RELEASEVER=$n \
            --build-arg "CHUNKAH_CONFIG_STR=$(podman inspect $base_img)" \
            -t "${{ env.QUAY_BASE }}:$n" .
      - name: Push
        run: |
          set -xeuo pipefail
          mkdir -p ~/.docker
          cat > ~/.docker/config.json <<EOF
          ${{ secrets.QUAY_AUTH }}
          EOF
          base64 --decode > ~/.cosign.key <<EOF
          ${{ secrets.COSIGN_PRIVATE_KEY }}
          EOF
          n=${{ matrix.releasever }}
          podman push --retry=12 "$QUAY_BASE:$n" --digestfile digest
          cosign sign -y --key ~/.cosign.key "$QUAY_BASE@$(cat digest)"
          if [[ $n == ${{ needs.query.outputs.latest }} ]]; then
            podman tag "$QUAY_BASE:$n" "$QUAY_BASE:latest"
            podman push --retry=12 "$QUAY_BASE:latest"
          fi
          rm ~/.cosign.key
          rm ~/.docker/config.json
      - name: Update README and Containerfile
        if: ${{ matrix.releasever == needs.query.outputs.latest }}
        run: |
          # This is load-bearing: GitHub will disable the job if the repo
          # doesn't stay active.  Do not enable branch protection for main;
          # it'll break this.
          set -xeuo pipefail
          git config user.name 'Jonathan Lebon'
          git config user.email jonathan@jlebon.com
          sed -i "s/updated-.*-green/updated-$(date +%Y--%m--%d)-green/" README.md
          sed -i "s,RELEASEVER=.*,RELEASEVER=${{ matrix.releasever }}," Containerfile
          git add README.md Containerfile
          if git diff --quiet --staged --exit-code; then
            echo "README.md already up to date"
            exit 0
          fi
          git commit -m "README.md: update build date"
          git push
